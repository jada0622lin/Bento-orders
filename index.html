<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元氣食堂 - 便當訂購系統</title>
    <style>
        /* 1. 配色與變數 */
        :root {
            --primary-orange: #FF9F1C;
            --deep-orange: #E76F51;
            --bg-light: #FDFCF0;
            --card-bg: #FFFFFF;
        }

        body {  
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* 容器與標題 */
        .container {
            width: 95%; max-width: 1100px;
            display: flex; gap: 20px; align-items: flex-start;
        }

        .header-area {
            width: 95%; max-width: 1100px; margin: 20px 0;
            text-align: center;
        }

        /* 標題彈性縮放：隨視窗寬度改變 */
        .header-area h1 {
            color: var(--deep-orange);
            margin: 0;
            font-size: clamp(1.2rem, 5vw, 2.2rem) !important;
            line-height: 1.3;
        }

        /* 選單佈局 */
        .menu-container { 
            flex: 2; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px;    
        }

        /* 便當卡片 */
        .item-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 240px; 
        }

        /* 餐點名稱彈性縮放 + 換行控制 */
        .item-name { 
            font-weight: 900; 
            font-size: clamp(0.9rem, 3.5vw, 1.3rem); 
            color: #222;
            line-height: 1.3;
            margin-bottom: 10px;
            min-height: 2.8em; /* 確保兩行高度 */
            word-break: break-word;
        }

        .item-price { 
            color: var(--deep-orange); font-weight: 800; 
            font-size: clamp(1.2rem, 4vw, 1.8rem); 
            margin-bottom: 12px; 
        }

        /* 數量與按鈕 */
        .input-group { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .qty-input { width: 50px; height: 38px; text-align: center; border: 2px solid #EEE; border-radius: 8px; font-size: 1.2rem; }
        .add-btn { 
            background-color: var(--primary-orange); color: white; border: none; 
            padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #cc7e0e; position: relative;
        }
        .add-btn:active { top: 4px; box-shadow: 0 0 0; }

        /* 側欄購物車 */
        .sidebar { 
            flex: 1; background: white; border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); min-width: 300px;
            border-top: 8px solid var(--primary-orange); box-sizing: border-box;
        }

        /* 手機 RWD 設定 */
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .menu-container { width: 100%; }
            .sidebar { width: 100%; min-width: 0; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>🍱 KITA元氣食堂 - 便當訂購系統</h1>
    </div>

    <div class="container">
        <div class="menu-container" id="menu"></div>

        <div class="sidebar">
            <div style="font-size: 1.3em; font-weight: bold; border-bottom: 2px dashed #DDD; padding-bottom: 10px; margin-bottom: 15px;">🍱 我的點餐內容</div>
            <ul id="cart-list" style="list-style: none; padding: 0;"><li>尚無選餐...</li></ul>
            <div style="color: var(--deep-orange); font-size: 1.8em; font-weight: 900; text-align: right; margin: 15px 0;">總計: $<span id="total-amount">0</span></div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight:bold; color:#666; display:block; margin-bottom:5px;">員工工號</label>
                <input type="text" id="emp-id" style="width:100%; padding:12px; border:2px solid #EEE; border-radius:10px; box-sizing:border-box;" placeholder="請輸入工號 số nhân viên">
            </div>
            <button onclick="submitOrder()" style="background:var(--primary-orange); color:white; width:100%; padding:15px; border:none; border-radius:12px; font-size:1.3em; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #cc7e0e;">送出訂單</button>
        </div>
    </div> 

<script>
    // 菜單資料 (中文與越文之間必須有空格)
    const items = [
        { name: "隨機精選便當 hộp cơm trưa", price: 80 },
        { name: "白飯 Cơm trắng", price: 10 }
    ];

    let cart = [];

    // 自動生成選單
    const menuEl = document.getElementById('menu');
    items.forEach((item, index) => {
        // 關鍵：將第一個空格替換為換行符號 <br>
        const displayName = item.name.replace(' ', '<br>');
        
        menuEl.innerHTML += `
            <div class="item-card">
                <div>
                    <div class="item-name">${displayName}</div>
                    <div class="item-price">$${item.price}</div>
                </div>
                <div class="input-group">
                    <input type="number" id="qty-${index}" class="qty-input" value="1" min="1">
                    <button class="add-btn" onclick="addToCart(${index})">加入</button>
                </div>
            </div>
        `;
    });

    function addToCart(index) {
        const qty = parseInt(document.getElementById(`qty-${index}`).value);
        const item = items[index];
        const existing = cart.find(c => c.name === item.name);
        if (existing) { existing.qty += qty; } else { cart.push({ ...item, qty }); }
        renderCart();
    }

    function renderCart() {
        const listEl = document.getElementById('cart-list');
        const totalEl = document.getElementById('total-amount');
        if (cart.length === 0) {
            listEl.innerHTML = '<li>尚無選餐...</li>';
            totalEl.innerText = '0';
            return;
        }
        listEl.innerHTML = cart.map((item, index) => `
            <li style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9;">
                <span><strong>${item.name}</strong> x ${item.qty}</span>
                <button onclick="removeFromCart(${index})" style="background:#ffeded; border:none; color:#d9534f; width:28px; height:28px; border-radius:50%; cursor:pointer;">✕</button>
            </li>
        `).join('');
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        totalEl.innerText = total;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

 function submitOrder() {
        const empId = document.getElementById('emp-id');
        const totalAmount = document.getElementById('total-amount').innerText;
        
        // 檢查防呆
        if (!empId.value || cart.length === 0) return alert('請確認工號並選擇餐點！');

        // 定義按鈕變數 (這是您漏掉的地方)
        const btn = document.querySelector('.submit-btn');
        const originalText = btn.innerText;
        
        // 改變按鈕狀態
        btn.innerText = "傳送訂單中...";
        btn.disabled = true;

        const orderSummary = cart.map(item => `${item.name}x${item.qty}`).join(', ');
        const payload = { empId: empId.value, orderItems: orderSummary, totalPrice: totalAmount };

        fetch('https://script.google.com/macros/s/AKfycbzFuSEGH1LZLHGGYMMakVR9FIMoeO7av3Gm1wLRAzCDc6VSCppBUdUgZ4UCWER5zne1_Q/exec', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert(`🎉 訂購完成！\n工號：${empId.value}\n訂單已記錄至後台。`);
            
            // 存入工號供下次使用
            localStorage.setItem('savedEmpId', empId.value); 

            cart = [];
            renderCart();
            
            // 恢復按鈕狀態
            btn.innerText = originalText;
            btn.disabled = false;
        })
        .catch(err => {
            console.error(err);
            alert('系統連線失敗，請稍後再試。');
            btn.innerText = originalText;
            btn.disabled = false;
        });
    }

    // --- 保持您的 window.onload 不變 ---
    window.onload = function() {
        const savedId = localStorage.getItem('savedEmpId');
        if (savedId) {
            const empInput = document.getElementById('emp-id');
            if (empInput) {
                empInput.value = savedId;
            }
        }
    };

</script>

</body>
</html>
