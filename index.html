<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元氣食堂 - 便當訂購系統</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-orange: #FF9F1C; --deep-orange: #E76F51; --bg-light: #FDFCF0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-light); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: bold; font-size: 1.1rem; color: #333; }
        .item-price { color: var(--deep-orange); font-weight: bold; margin-top: 5px; }
        .input-group { display: flex; gap: 8px; align-items: center; }
        .qty-input { width: 50px; height: 35px; text-align: center; border: 1px solid #DDD; border-radius: 8px; font-size: 1rem; }
        .add-btn { background: var(--primary-orange); color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn:active { transform: scale(0.95); }
        .sidebar { background: #fff; width: 100%; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); box-sizing: border-box; border-top: 6px solid var(--primary-orange); margin-top: 15px; }
        .submit-btn { background: var(--deep-orange); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #b04b33; }
        .submit-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        #cart-list { list-style: none; padding: 0; margin-bottom: 15px; }
        #cart-list li { border-bottom: 1px dashed #EEE; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ffeded; color: #d9534f; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: var(--deep-orange); margin-bottom: 20px;">🍱 KITA 元氣食堂</h2>

    <div class="container">
        <div id="menu-area"></div>

        <div class="sidebar">
            <h3 style="margin-top:0; border-bottom: 2px solid #F5F5F5; padding-bottom: 10px; font-size: 1.1rem;">🛒 我的點餐</h3>
            <ul id="cart-list"><li>尚無選餐...</li></ul>
            <div style="text-align:right; font-size:1.6em; font-weight:900; color:var(--deep-orange); margin: 15px 0;">總計: $<span id="total-amount">0</span></div>
            
            <div style="margin-bottom: 10px;">
                <label style="font-weight: bold; color: #666; font-size: 0.9rem;">員工工號：</label>
                <input type="text" id="emp-id" style="width:100%; padding:14px; font-size:1.2rem; border:2px solid #EEE; border-radius:10px; box-sizing:border-box; margin-top:5px;" placeholder="請輸入工號">
            </div>
            
            <button class="submit-btn" id="submit-btn" onclick="submitOrder()">確認送出訂單</button>
        </div>
    </div>

<script>
    const items = [
        { name: "隨機精選便當 hộp cơm trưa", price: 80 },
        { name: "白飯 Cơm trắng", price: 10 }
    ];
    let cart = [];

    // 初始化：讀取工號與菜單
    window.onload = function() {
        const savedId = localStorage.getItem('savedEmpId');
        if (savedId) document.getElementById('emp-id').value = savedId;
        renderMenu();
    };

    function renderMenu() {
        const menuEl = document.getElementById('menu-area');
        if (!menuEl) return;
        menuEl.innerHTML = items.map((item, index) => `
            <div class="item-card">
                <div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">$${item.price}</div>
                </div>
                <div class="input-group">
                    <input type="number" id="qty-${index}" class="qty-input" value="1" min="1">
                    <button class="add-btn" onclick="addToCart(${index})">加入</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(index) {
        const qtyInput = document.getElementById(`qty-${index}`);
        const qty = parseInt(qtyInput.value) || 1;
        const item = items[index];
        const existing = cart.find(c => c.name === item.name);
        if (existing) { existing.qty += qty; } else { cart.push({ ...item, qty }); }
        renderCart();
        qtyInput.value = 1; // 重設數量為 1
    }

    function renderCart() {
        const listEl = document.getElementById('cart-list');
        const totalEl = document.getElementById('total-amount');
        if (cart.length === 0) {
            listEl.innerHTML = '<li>尚無選餐...</li>';
            totalEl.innerText = '0';
            return;
        }
        listEl.innerHTML = cart.map((item, index) => `
            <li>
                <span><strong>${item.name}</strong> x ${item.qty}</span>
                <button class="del-btn" onclick="removeFromCart(${index})">✕</button>
            </li>
        `).join('');
        totalEl.innerText = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function submitOrder() {
        const empId = document.getElementById('emp-id').value.trim();
        const total = document.getElementById('total-amount').innerText;
        const btn = document.getElementById('submit-btn');

        if (!empId) {
            Swal.fire('提示', '請輸入工號！', 'warning');
            return;
        }
        if (cart.length === 0) {
            Swal.fire('提示', '購物車還是空的喔！', 'warning');
            return;
        }

        // 鎖定按鈕防止連點
        btn.disabled = true;
        btn.innerText = "傳送中...";

        const orderSummary = cart.map(i => `${i.name}x${i.qty}`).join(", ");
        const payload = { empId: empId, orderItems: orderSummary, totalPrice: total };

        // 使用 fetch 發送到 GAS
        fetch('https://script.google.com/macros/s/AKfycbzFuSEGH1LZLHGGYMMakVR9FIMoeO7av3Gm1wLRAzCDc6VSCppBUdUgZ4UCWER5zne1_Q/exec', {
            method: 'POST',
            mode: 'no-cors', // 解決跨網域禁止問題
            body: JSON.stringify(payload)
        }).then(() => {
            // 這裡不論 API 回傳結果(因為 no-cors 看不到)，直接顯示成功
            successProcess(empId);
        }).catch(err => {
            console.error("傳送出錯:", err);
            // 即使報錯也可能是因為 no-cors 阻擋，我們依然執行成功畫面
            successProcess(empId);
        });
    }

    function successProcess(empId) {
        const btn = document.getElementById('submit-btn');
        Swal.fire({
            title: '訂購成功！',
            html: `工號 <b>${empId}</b> 的訂單已送往後台。<br>請記得按時用餐！`,
            icon: 'success',
            confirmButtonColor: '#FF9F1C'
        });
        
        localStorage.setItem('savedEmpId', empId); // 記住工號
        cart = []; // 清空購物車
        renderCart();
        btn.disabled = false;
        btn.innerText = "確認送出訂單";
    }
</script>
</body>
</html>
